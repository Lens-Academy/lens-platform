# All user-facing messages sent by the notification system.
# Edit this file to change any communication.
#
# Template variables use {variable_name} syntax.
# Common variables: {name}, {email}, {group_name}, {meeting_time},
#   {module_url}, {discord_channel_url}, {profile_url}

welcome:
  email_subject: Welcome to the Lens Academy AI Safety Course
  email_body: |
    Hi {name},

    Thanks for enrolling! We're excited to have you.

    What happens next:
    - We'll match you with a study group based on your availability
    - You'll receive an email with your group details and calendar invite

    [Join our Discord server]({discord_invite_url}) to chat with the other people who enrolled, as well as the team behind Lens Academy.

    Questions? Ask us on the Discord server.

    Best,
    Luc
    Founder of Lens Academy
  discord: |
    Welcome {name}! Thanks for enrolling.
    We'll match you with a study group soon based on your availability.

group_assigned:
  email_subject: "You've been assigned to a group: {group_name}"
  email_body: |
    Hi {name},

    Great news! You've been matched with a study group.

    Group: {group_name}
    Meeting time: {meeting_time}
    Your groupmates: {member_names}

    Meetings are held on Zoom. You'll receive the join link in your calendar invite and in reminders before each meeting.

    [Chat with your group on Discord]({discord_channel_url})

    Best,
    Luc
    Founder of Lens Academy
  discord: |
    You've been assigned to **{group_name}**!
    Meeting time: {meeting_time}
    Meetings are on Zoom — you'll get the join link in your calendar invite and before each meeting.
    Check your email for the calendar invite.
  calendar_title: "Lens Academy Study Group: {group_name}"
  calendar_description: |
    Weekly study group meeting.
    Group members: {member_names}

member_joined:
  email_subject: "Welcome to {group_name}!"
  email_body: |
    Hi {name},

    You've joined {group_name}!

    Meeting time: {meeting_time}
    Your groupmates: {member_names}

    Meetings are held on Zoom. You'll receive the join link in your calendar invite and in reminders before each meeting.

    [Chat with your group on Discord]({discord_channel_url})

    A calendar invite has been sent to your email.

    Best,
    Luc
    Founder of Lens Academy
  discord_channel: |
    Welcome {member_mention}! 👋 They've joined the group.

member_left:
  discord_channel: |
    👋 {member_mention} has left the group.

meeting_reminder_24h:
  email_subject: "Reminder: {group_name} meeting tomorrow"
  email_body: |
    Hi {name},

    Your study group meets tomorrow at {meeting_time}. You have {modules_remaining} sections left to complete.

    Haven't finished the module yet? Try to make some progress today — late submissions are still accepted.

    [{cta_text}]({module_url})

    [Join Zoom Meeting]({zoom_join_url})

    Best,
    Luc
    Founder of Lens Academy
  discord_channel: |
    Reminder: Meeting tomorrow at {meeting_time}!

    Haven't finished the module yet? Late submissions are still accepted — try to make some progress today!

    **Join Zoom:** {zoom_join_url}

meeting_reminder_1h:
  email_subject: "Reminder: {group_name} meeting in 1 hour"
  email_body: |
    Hi {name},

    Your study group meets in 1 hour at {meeting_time}.

    Even if you haven't finished the module, join the discussion — you'll still get a lot out of it. You can submit late afterwards.

    [Join Zoom Meeting]({zoom_join_url})

    See you there!

    Best,
    Luc
    Founder of Lens Academy
  discord_channel: |
    Meeting starting in 1 hour! Even if you haven't finished the module, join the discussion — late submissions are accepted.

    **Join Zoom:** {zoom_join_url}

module_nudge:
  email_subject: "Your module is due today"
  email_body: |
    Hi {name},

    Your module is due today! You'll discuss it with your study group in 3 days ({meeting_date}).

    You have {modules_remaining} sections left. Studying works better when spaced out, so we highly suggest finishing today.

    [{cta_text}]({module_url})

    Can't finish it all today? That's OK — try to at least make some progress now. You can still submit late in the following days.

    Best,
    Luc
    Founder of Lens Academy
  discord: |
    Your module is due today! You'll discuss it with {group_name} in 3 days ({meeting_date}).

    You have **{modules_remaining} sections** left. Studying works better when spaced out, so we highly suggest finishing today.

    Can't finish today? Try to make some progress now — you can still submit late. [{cta_text}]({module_url})
  discord_channel: |
    📚 **Module due today!** You'll discuss it at your meeting on {meeting_date}.

    Studying works better when spaced out — try to finish today! [{cta_text}]({module_url})

