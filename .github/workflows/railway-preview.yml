name: Railway Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - prototypes

permissions:
  contents: read
  pull-requests: write
  deployments: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v4

      - name: Generate environment name
        id: env_name
        run: |
          # Sanitize PR title: lowercase, replace non-alphanumeric with dashes, truncate
          TITLE="${{ github.event.pull_request.title }}"
          SANITIZED=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-30)
          echo "name=pr-${{ github.event.pull_request.number }}-${SANITIZED}" >> $GITHUB_OUTPUT

      - name: Deploy to Railway
        id: deploy
        uses: ayungavis/railway-preview-deploy@v1.0.2
        with:
          railway_api_token: ${{ secrets.RAILWAY_API_TOKEN }}
          project_id: ${{ secrets.RAILWAY_PROJECT_ID }}
          environment_name: 'prototypes'
          preview_environment_name: ${{ steps.env_name.outputs.name }}
          branch_name: ${{ github.head_ref }}

      - name: Debug outputs
        run: |
          echo "service_domain: ${{ steps.deploy.outputs.service_domain }}"
          echo "All outputs: ${{ toJSON(steps.deploy.outputs) }}"

      - name: Trigger fresh build from PR branch
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          ENV_NAME: ${{ steps.env_name.outputs.name }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # The preview-deploy action creates the environment and updates triggers
          # but only redeploys the old image. We need to trigger a fresh build from
          # the PR branch using serviceInstanceDeployV2 with the exact commit SHA.

          # 1. Look up the preview environment ID
          ENV_ID=$(curl -s https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"{ project(id: \\\"$PROJECT_ID\\\") { environments { edges { node { id name } } } } }\"}" \
            | jq -r ".data.project.environments.edges[] | select(.node.name == \"$ENV_NAME\") | .node.id")

          echo "Environment ID: $ENV_ID"

          if [ -z "$ENV_ID" ] || [ "$ENV_ID" = "null" ]; then
            echo "::error::Could not find environment '$ENV_NAME'"
            exit 1
          fi

          # 2. Look up service IDs in this environment
          SERVICES=$(curl -s https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"{ project(id: \\\"$PROJECT_ID\\\") { services { edges { node { id name } } } } }\"}" \
            | jq -r '.data.project.services.edges[].node.id')

          echo "Services: $SERVICES"

          # 3. Deploy each service from the PR's head commit
          for SERVICE_ID in $SERVICES; do
            echo "Deploying service $SERVICE_ID in environment $ENV_ID from commit $COMMIT_SHA..."
            RESULT=$(curl -s https://backboard.railway.com/graphql/v2 \
              -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"mutation { serviceInstanceDeployV2(serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"$ENV_ID\\\", commitSha: \\\"$COMMIT_SHA\\\") }\"}")
            echo "Result: $RESULT"
          done

      - name: Comment with preview URL
        uses: actions/github-script@v7
        env:
          ENV_NAME: ${{ steps.env_name.outputs.name }}
        with:
          script: |
            const marker = '<!-- railway-preview -->';
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            // Use action output if available, otherwise construct from env name
            const serviceDomain = '${{ steps.deploy.outputs.service_domain }}' || `lens-academy-${process.env.ENV_NAME}.up.railway.app`;

            const body = [
              marker,
              '🚀 **Preview deployed!**',
              '',
              `🔗 https://${serviceDomain}`
            ].join('\n');

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            }

      - name: Wait for Railway deployment to complete
        run: sleep 90

      - name: Create deployment with correct URL
        uses: actions/github-script@v7
        env:
          ENV_NAME: ${{ steps.env_name.outputs.name }}
        with:
          script: |
            const serviceDomain = '${{ steps.deploy.outputs.service_domain }}' || `lens-academy-${process.env.ENV_NAME}.up.railway.app`;
            const environmentUrl = `https://${serviceDomain}`;
            const envName = `preview-${process.env.ENV_NAME}`;

            // Create our own deployment using the PR head commit (not the merge commit)
            const { data: deployment } = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
              environment: envName,
              auto_merge: false,
              required_contexts: [],
              description: 'Preview deployment'
            });

            // Set it to success with correct URL
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.id,
              state: 'success',
              environment_url: environmentUrl,
              description: 'Preview deployment ready'
            });

            console.log(`Created deployment ${deployment.id} (${envName}) with URL: ${environmentUrl}`);

  cleanup:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    steps:
      - uses: actions/checkout@v4

      - name: Generate environment name
        id: env_name
        run: |
          # Sanitize PR title: lowercase, replace non-alphanumeric with dashes, truncate
          TITLE="${{ github.event.pull_request.title }}"
          SANITIZED=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-30)
          echo "name=pr-${{ github.event.pull_request.number }}-${SANITIZED}" >> $GITHUB_OUTPUT

      - name: Cleanup Railway Environment
        uses: ayungavis/railway-preview-deploy@v1.0.2
        with:
          railway_api_token: ${{ secrets.RAILWAY_API_TOKEN }}
          project_id: ${{ secrets.RAILWAY_PROJECT_ID }}
          environment_name: 'prototypes'
          preview_environment_name: ${{ steps.env_name.outputs.name }}
          branch_name: ${{ github.head_ref }}
          cleanup: 'true'
